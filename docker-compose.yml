services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cubenet
      POSTGRES_PASSWORD: cubenet
      POSTGRES_DB: cubenet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cubenet"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://cubenet:cubenet@postgres:5432/cubenet?sslmode=disable"
      JWT_SECRET: "dev-secret-change-in-production"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "cubenet"
      S3_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cms

volumes:
  pgdata:
  miniodata:
