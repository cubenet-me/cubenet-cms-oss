services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cubenet
      POSTGRES_PASSWORD: cubenet
      POSTGRES_DB: cubenet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cubenet"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  auth:
    build:
      context: ./backend
      dockerfile: Dockerfile.auth
    environment:
      ADDR: ":8081"
      DB_NAME: "cubenet_auth"
      DATABASE_URL: "postgres://cubenet:cubenet@postgres:5432/cubenet_auth?sslmode=disable"
      JWT_SECRET: "dev-secret-change-in-production"
    depends_on:
      postgres:
        condition: service_healthy

  servers:
    build:
      context: ./backend
      dockerfile: Dockerfile.servers
    environment:
      ADDR: ":8082"
      DB_NAME: "cubenet_servers"
      DATABASE_URL: "postgres://cubenet:cubenet@postgres:5432/cubenet_servers?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  launcher:
    build:
      context: ./backend
      dockerfile: Dockerfile.launcher
    environment:
      ADDR: ":8083"
      DB_NAME: "cubenet_launcher"
      DATABASE_URL: "postgres://cubenet:cubenet@postgres:5432/cubenet_launcher?sslmode=disable"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "cubenet"
      S3_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  news:
    build:
      context: ./backend
      dockerfile: Dockerfile.news
    environment:
      ADDR: ":8084"
      DB_NAME: "cubenet_news"
      DATABASE_URL: "postgres://cubenet:cubenet@postgres:5432/cubenet_news?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  ws:
    build:
      context: ./backend
      dockerfile: Dockerfile.ws
    environment:
      ADDR: ":8085"
    depends_on:
      - postgres

  site:
    build: ./site
    environment:
      ORIGIN: "http://localhost"
    depends_on:
      - auth
      - servers
      - launcher
      - news
      - ws

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth
      - servers
      - launcher
      - news
      - ws
      - site

volumes:
  pgdata:
  miniodata:
