services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cubenet
      POSTGRES_PASSWORD: cubenet
      POSTGRES_DB: cubenet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://cubenet:cubenet@postgres:5432/cubenet?sslmode=disable"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET: "cubenet"
      S3_USE_SSL: "false"
      JWT_SECRET: "dev-secret-change-in-production"
    depends_on:
      - postgres
      - minio

volumes:
  pgdata:
  miniodata:
